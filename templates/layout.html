<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autonomía</title>
    <!-- Tus estilos CSS si los tienes -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Barra de Navegación / Botonera Móvil -->

        <ul>
            <li><a href="{{ url_for('index') }}">Inicio</a></li>
            <li><a href="{{ url_for('medications') }}">Medicaciones</a></li>
            <li><a href="{{ url_for('contacts') }}">Contactos de Emergencia</a></li>
        </ul>
    </nav>

    <hr>

    <!-- El bloque principal donde se inyecta el contenido de cada pantalla -->
    <main>
        {% block main %}{% endblock %}
    </main>

</body>
</html>

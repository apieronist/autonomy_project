<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autonomía</title>
    <!-- Tus estilos CSS si los tienes -->
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <!-- Barra de Navegación / Botonera Móvil -->
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="medications">Medicaciones</a></li>
            <li><a href="contacts">Contactos de Emergencia</a></li>
        </ul>
    </nav>

    <hr>

    <!-- El bloque principal donde se inyecta el contenido de cada pantalla -->
    <main>
        
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div id="alert-container" class="mb-4"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold m-0">Today's Schedule</h1>
            <span id="current-time-display" class="badge bg-secondary fs-5 p-2">00:00</span>
        </div>

        <div id="medications-list">
            <div class="text-center text-muted p-5 dashboard-card">
                <p class="fs-4 m-0">No medications configured yet.</p>
                <a href="/medications" class="btn btn-primary btn-lg mt-3">Add Medication</a>
            </div>
        </div>

    </div>
</div>

<script>
    // Pequeño script local para actualizar el reloj en pantalla inmediatamente
    function updateClock() {
        const now = new Date();
        const timeString = now.toTimeString().substring(0, 5);
        document.getElementById('current-time-display').innerText = timeString;
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>

    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomy Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-info" href="/">☀️ Autonomy</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav ms-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="nav-link fs-5 px-3" href="/">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 px-3" href="medications.html">💊 Medications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 px-3" href="contacts.html">📞 Emergency Contacts</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container px-3">
        
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div id="alert-container" class="mb-4"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold m-0">Today's Schedule</h1>
            <span id="current-time-display" class="badge bg-secondary fs-5 p-2">00:00</span>
        </div>

        <div id="medications-list">
            <div class="text-center text-muted p-5 dashboard-card">
                <p class="fs-4 m-0">No medications configured yet.</p>
                <a href="/medications" class="btn btn-primary btn-lg mt-3">Add Medication</a>
            </div>
        </div>

    </div>
</div>

<script>
    // Pequeño script local para actualizar el reloj en pantalla inmediatamente
    function updateClock() {
        const now = new Date();
        const timeString = now.toTimeString().substring(0, 5);
        document.getElementById('current-time-display').innerText = timeString;
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/static/js/database.js"></script>
    <script src="/static/js/alerts.js"></script>
</body>
</html>
